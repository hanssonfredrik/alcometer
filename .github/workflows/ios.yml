# Builds the iOS app on a macOS runner and uploads it to TestFlight.
# There is no local Mac in this project's dev setup — this workflow IS the
# iOS build machine. Signing uses Xcode cloud-managed signing via an
# App Store Connect API key, so no certificates/profiles are stored in CI.
#
# Required repository secrets (App Store Connect → Users and Access → Keys;
# the key needs the "App Manager" or "Admin" role for cloud signing):
#   APP_STORE_CONNECT_KEY_ID      e.g. "2X9R4HXF34"
#   APP_STORE_CONNECT_ISSUER_ID   e.g. "57246542-96fe-1a63-e053-0824d011072a"
#   APP_STORE_CONNECT_PRIVATE_KEY contents of the AuthKey_<KEY_ID>.p8 file
#   APPLE_TEAM_ID                 e.g. "AB12CD34EF"
#
# One-time prerequisites (web UI, no Mac needed):
#   1. Register the bundle id "se.venueve.neontracker" at
#      developer.apple.com → Identifiers.
#   2. Create the app in App Store Connect with that bundle id.

name: iOS (TestFlight)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build web app and sync Capacitor
        run: |
          npm ci
          npm run build
          npx cap sync ios

      - name: Write App Store Connect API key
        env:
          PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          printf '%s' "$PRIVATE_KEY" > ~/private_keys/AuthKey_${KEY_ID}.p8

      - name: Archive
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}

      - name: Export and upload to TestFlight
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>manageAppVersionAndBuildNumber</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID"

      - name: Upload archive as artifact (debugging aid)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcarchive-logs
          path: |
            build/App.xcarchive/Info.plist
            ~/Library/Logs/gym
          if-no-files-found: ignore
