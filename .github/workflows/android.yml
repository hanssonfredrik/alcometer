# Builds the Android app. Every run compiles a debug APK as a smoke test;
# tag builds additionally produce a Play-Store-ready signed AAB when the
# signing secrets are configured.
#
# Required repository secrets for release signing (all optional until the
# first Play upload):
#   ANDROID_KEYSTORE_BASE64      base64 of the upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
#
# Create the keystore once with:
#   keytool -genkey -v -keystore upload.jks -keyalg RSA -keysize 2048 \
#     -validity 10000 -alias upload

name: Android

on:
  workflow_dispatch:
  push:
    tags: ['v*']
  pull_request:
    paths-ignore: ['**.md']

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build web app and sync Capacitor
        run: |
          npm ci
          npm run build
          npx cap sync android

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: neon-tracker-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build signed release AAB
        if: startsWith(github.ref, 'refs/tags/v') && env.KEYSTORE != ''
        env:
          KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE" | base64 -d > upload.jks
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$PWD/upload.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
        working-directory: android

      - name: Upload release AAB
        if: startsWith(github.ref, 'refs/tags/v') && env.KEYSTORE != ''
        env:
          KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: neon-tracker-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
